name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run black
        run: black --check app/

      - name: Run isort
        run: isort --check-only app/

      - name: Run ruff
        run: ruff check app/

      - name: Run mypy
        run: mypy .

      - name: Run tests
        run: pytest
